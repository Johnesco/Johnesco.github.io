<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>State Abbreviations</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0f0f1a;--card:#1a1a2e;--accent:#7c83ff;--accent2:#ffb07c;
    --text:#e0e0e0;--dim:#666;--success:#4ade80;--fail:#f87171;
    --gold:#ffd700;
  }
  body{
    font-family:'Segoe UI',system-ui,sans-serif;
    background:var(--bg);color:var(--text);
    min-height:100vh;overflow-x:hidden;
  }

  /* ── Header ── */
  header{
    text-align:center;padding:1.5rem 1rem .5rem;
    position:relative;z-index:10;
  }
  header h1{font-size:1.8rem;font-weight:700;letter-spacing:-.02em}
  header h1 span{color:var(--accent)}
  .subtitle{color:var(--dim);font-size:.85rem;margin-top:.25rem}

  /* ── Mode tabs ── */
  .tabs{
    display:flex;justify-content:center;gap:.5rem;
    margin:1rem auto;max-width:400px;
  }
  .tab{
    flex:1;padding:.6rem 1rem;border:2px solid var(--accent);
    background:transparent;color:var(--accent);border-radius:8px;
    font-size:.95rem;font-weight:600;cursor:pointer;
    transition:all .25s;
  }
  .tab:hover,.tab.active{
    background:var(--accent);color:var(--bg);
  }

  /* ── Panels ── */
  #learn-panel,#quiz-panel{display:none;padding:1rem}
  #learn-panel.active,#quiz-panel.active{display:block}

  /* ── LEARN MODE ── */
  .learn-controls{
    display:flex;justify-content:center;gap:.5rem;flex-wrap:wrap;
    margin-bottom:1rem;
  }
  .learn-controls button{
    padding:.4rem .8rem;border-radius:6px;border:1px solid #333;
    background:var(--card);color:var(--text);cursor:pointer;
    font-size:.8rem;transition:all .2s;
  }
  .learn-controls button:hover,.learn-controls button.active{
    border-color:var(--accent);color:var(--accent);
  }

  .cards-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
    gap:.6rem;max-width:1000px;margin:0 auto;
    perspective:1200px;
  }

  .card{
    height:100px;cursor:pointer;position:relative;
    transform-style:preserve-3d;transition:transform .5s;
  }
  .card.flipped{transform:rotateY(180deg)}
  .card-face{
    position:absolute;inset:0;border-radius:10px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    backface-visibility:hidden;
    border:1px solid #2a2a3e;
  }
  .card-front{
    background:var(--card);
  }
  .card-back{
    background:linear-gradient(135deg,#1e1e3a,#2a2a4e);
    transform:rotateY(180deg);
  }
  .card .abbr{
    font-size:1.8rem;font-weight:800;color:var(--accent);
    letter-spacing:.05em;
  }
  .card .state-name{
    font-size:.7rem;color:var(--dim);margin-top:.2rem;
    text-align:center;padding:0 .3rem;
  }
  .card-back .mnemonic{
    font-size:.65rem;color:var(--accent2);margin-top:.3rem;
    text-align:center;padding:0 .4rem;font-style:italic;
    line-height:1.3;
  }

  /* stagger entrance */
  .card{opacity:0;transform:translateY(20px) scale(.95)}
  .card.enter{
    animation:cardIn .4s forwards;
  }
  .card.flipped.enter{
    animation:cardInFlipped .4s forwards;
  }
  @keyframes cardIn{
    to{opacity:1;transform:translateY(0) scale(1) rotateY(0deg)}
  }
  @keyframes cardInFlipped{
    to{opacity:1;transform:translateY(0) scale(1) rotateY(180deg)}
  }

  /* Flip All / shuffle animation */
  .card.shuffle{
    animation:shuffleBounce .4s;
  }
  @keyframes shuffleBounce{
    0%{transform:scale(1)}
    30%{transform:scale(.85) rotate(-3deg)}
    70%{transform:scale(1.05) rotate(2deg)}
    100%{transform:scale(1)}
  }

  /* ── QUIZ MODE ── */
  .quiz-container{
    max-width:600px;margin:0 auto;text-align:center;
  }
  .quiz-score{
    display:flex;justify-content:center;gap:2rem;margin-bottom:1.5rem;
    font-size:.9rem;
  }
  .quiz-score span{color:var(--dim)}
  .quiz-score strong{color:var(--accent);font-size:1.1rem}
  .quiz-timer{color:var(--dim);font-size:.8rem;margin-bottom:1rem}
  .quiz-timer.warn{color:var(--fail);font-weight:700;font-size:.9rem}

  .quiz-prompt{
    font-size:1.1rem;color:var(--dim);margin-bottom:.5rem;
  }
  .quiz-state{
    font-size:2.2rem;font-weight:800;margin-bottom:1.5rem;
    min-height:3rem;
  }
  .quiz-state.reverse{color:var(--accent);letter-spacing:.1em}

  .quiz-options{
    display:grid;grid-template-columns:1fr 1fr;gap:.6rem;
    max-width:400px;margin:0 auto 1.5rem;
  }
  .quiz-opt{
    padding:.8rem;border-radius:10px;border:2px solid #2a2a3e;
    background:var(--card);color:var(--text);font-size:1rem;
    cursor:pointer;transition:all .2s;font-weight:600;
  }
  .quiz-opt:hover{border-color:var(--accent);transform:scale(1.03)}
  .quiz-opt.correct{
    border-color:var(--success);background:#4ade8020;color:var(--success);
    animation:popCorrect .35s;
  }
  .quiz-opt.wrong{
    border-color:var(--fail);background:#f8717120;color:var(--fail);
    animation:shake .35s;
  }
  @keyframes popCorrect{
    0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}
  }
  @keyframes shake{
    0%,100%{transform:translateX(0)}
    25%{transform:translateX(-6px)}75%{transform:translateX(6px)}
  }

  .quiz-progress{
    width:100%;height:6px;background:#1a1a2e;border-radius:3px;
    overflow:hidden;margin-bottom:1rem;
  }
  .quiz-progress-bar{
    height:100%;background:var(--accent);transition:width .3s;
    border-radius:3px;
  }

  .quiz-complete{display:none;text-align:center}
  .quiz-complete h2{font-size:2rem;margin-bottom:.5rem}
  .quiz-complete .final-score{font-size:3rem;font-weight:800;color:var(--accent)}
  .quiz-complete .final-label{color:var(--dim);margin-bottom:1.5rem}
  .quiz-complete .grade{font-size:1.5rem;margin-bottom:1rem}
  .quiz-complete button{
    padding:.6rem 1.5rem;border-radius:8px;border:none;
    background:var(--accent);color:var(--bg);font-weight:700;
    font-size:1rem;cursor:pointer;
  }

  /* missed list */
  .missed-list{
    max-width:400px;margin:1rem auto;text-align:left;
  }
  .missed-list h3{color:var(--fail);margin-bottom:.5rem;font-size:.9rem}
  .missed-item{
    display:flex;justify-content:space-between;
    padding:.3rem .5rem;border-bottom:1px solid #1a1a2e;
    font-size:.85rem;
  }
  .missed-item .mi-state{color:var(--dim)}
  .missed-item .mi-abbr{color:var(--accent);font-weight:700}

  /* ── NOT NOW DOTTIE ── */
  #dottie{
    position:fixed;inset:0;z-index:9999;
    display:flex;align-items:center;justify-content:center;
    background:rgba(0,0,0,.92);
    pointer-events:none;opacity:0;
    transition:opacity .15s;
  }
  #dottie.show{opacity:1;pointer-events:auto}
  #dottie .dottie-text{
    font-size:clamp(2rem,8vw,5rem);font-weight:900;
    color:#fff;text-transform:uppercase;
    text-shadow:0 0 40px var(--fail),0 0 80px var(--fail);
    animation:dottieShake .08s infinite alternate;
    letter-spacing:.05em;
  }
  @keyframes dottieShake{
    from{transform:translate(-2px,1px) rotate(-1deg)}
    to{transform:translate(2px,-1px) rotate(1deg)}
  }

  /* ── streak flame ── */
  .streak{
    position:fixed;top:1rem;right:1rem;
    font-size:1.5rem;display:none;z-index:50;
    animation:flamePulse 1s infinite alternate;
  }
  .streak.on{display:block}
  .streak-num{
    font-weight:800;color:var(--gold);font-size:1.2rem;
    vertical-align:middle;
  }
  @keyframes flamePulse{
    from{transform:scale(1)}to{transform:scale(1.15)}
  }

  /* ── Region chips ── */
  .region-tag{
    display:inline-block;padding:1px 5px;border-radius:3px;
    font-size:.55rem;font-weight:600;margin-top:2px;
    text-transform:uppercase;letter-spacing:.04em;
  }
  .region-NE{background:#6366f140;color:#818cf8}
  .region-SE{background:#f9731640;color:#fb923c}
  .region-MW{background:#22c55e30;color:#4ade80}
  .region-SW{background:#eab30830;color:#fbbf24}
  .region-W{background:#06b6d430;color:#22d3ee}

  /* responsive */
  @media(max-width:500px){
    .cards-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr))}
    .card{height:85px}
    .card .abbr{font-size:1.4rem}
  }
</style>
</head>
<body>

<header>
  <h1>State <span>Abbreviations</span></h1>
  <div class="subtitle">All 50 states &mdash; learn &amp; quiz</div>
</header>

<div class="tabs">
  <button class="tab active" data-mode="learn">Learn</button>
  <button class="tab" data-mode="quiz">Quiz</button>
</div>

<div id="learn-panel" class="active">
  <div class="learn-controls">
    <button class="active" data-filter="all">All</button>
    <button data-filter="NE">Northeast</button>
    <button data-filter="SE">Southeast</button>
    <button data-filter="MW">Midwest</button>
    <button data-filter="SW">Southwest</button>
    <button data-filter="W">West</button>
    <button id="btn-flip-all">Flip All</button>
    <button id="btn-shuffle">Shuffle</button>
  </div>
  <div class="cards-grid" id="cards-grid"></div>
</div>

<div id="quiz-panel">
  <div class="quiz-container">
    <div class="quiz-progress"><div class="quiz-progress-bar" id="q-bar"></div></div>
    <div class="quiz-score">
      <span>Score: <strong id="q-score">0</strong>/50</span>
      <span>Streak: <strong id="q-streak">0</strong></span>
    </div>
    <div class="quiz-timer" id="q-timer">0:00</div>
    <div class="quiz-prompt" id="q-prompt">What is the abbreviation for:</div>
    <div class="quiz-state" id="q-state"></div>
    <div class="quiz-options" id="q-opts"></div>
    <div class="quiz-complete" id="q-complete">
      <h2>Quiz Complete!</h2>
      <div class="final-score" id="q-final"></div>
      <div class="final-label">out of 50</div>
      <div class="grade" id="q-grade"></div>
      <div class="missed-list" id="q-missed"></div>
      <button onclick="startQuiz()">Try Again</button>
    </div>
  </div>
</div>

<div class="streak" id="streak-flame">&#x1F525;<span class="streak-num" id="streak-num">0</span></div>

<div id="dottie"><div class="dottie-text">NOT NOW DOTTIE!</div></div>

<script>
const STATES = [
  {s:"Alabama",a:"AL",r:"SE",m:"ALways humid"},
  {s:"Alaska",a:"AK",r:"W",m:"AK! It's cold!"},
  {s:"Arizona",a:"AZ",r:"SW",m:"AriZona from A to Z"},
  {s:"Arkansas",a:"AR",r:"SE",m:"AR you from Arkansas?"},
  {s:"California",a:"CA",r:"W",m:"CAlifornia dreamin'"},
  {s:"Colorado",a:"CO",r:"W",m:"COlorado mountains"},
  {s:"Connecticut",a:"CT",r:"NE",m:"ConneCTicut"},
  {s:"Delaware",a:"DE",r:"NE",m:"DElaware, first state"},
  {s:"Florida",a:"FL",r:"SE",m:"FLorida sunshine"},
  {s:"Georgia",a:"GA",r:"SE",m:"GA! Georgia on my mind"},
  {s:"Hawaii",a:"HI",r:"W",m:"Say HI in Hawaii"},
  {s:"Idaho",a:"ID",r:"W",m:"IDaho potatoes"},
  {s:"Illinois",a:"IL",r:"MW",m:"ILLinois (double L)"},
  {s:"Indiana",a:"IN",r:"MW",m:"You're IN Indiana"},
  {s:"Iowa",a:"IA",r:"MW",m:"IAm from Iowa"},
  {s:"Kansas",a:"KS",r:"MW",m:"KanSaS → KS"},
  {s:"Kentucky",a:"KY",r:"SE",m:"KentuckY → KY"},
  {s:"Louisiana",a:"LA",r:"SE",m:"LA like Los... no, Louisiana!"},
  {s:"Maine",a:"ME",r:"NE",m:"It's all about ME (Maine)"},
  {s:"Maryland",a:"MD",r:"NE",m:"MaralanD → MD"},
  {s:"Massachusetts",a:"MA",r:"NE",m:"MAss. starts with MA"},
  {s:"Michigan",a:"MI",r:"MW",m:"MIchigan mitten"},
  {s:"Minnesota",a:"MN",r:"MW",m:"MiNNesota → MN"},
  {s:"Mississippi",a:"MS",r:"SE",m:"MiSSissippi → MS"},
  {s:"Missouri",a:"MO",r:"MW",m:"MOssissouri → MO"},
  {s:"Montana",a:"MT",r:"W",m:"MonTana mountains → MT"},
  {s:"Nebraska",a:"NE",r:"MW",m:"NEbraska → NE"},
  {s:"Nevada",a:"NV",r:"W",m:"NeVada → NV"},
  {s:"New Hampshire",a:"NH",r:"NE",m:"New Hampshire → NH"},
  {s:"New Jersey",a:"NJ",r:"NE",m:"New Jersey → NJ"},
  {s:"New Mexico",a:"NM",r:"SW",m:"New Mexico → NM"},
  {s:"New York",a:"NY",r:"NE",m:"New York → NY"},
  {s:"North Carolina",a:"NC",r:"SE",m:"North Carolina → NC"},
  {s:"North Dakota",a:"ND",r:"MW",m:"North Dakota → ND"},
  {s:"Ohio",a:"OH",r:"MW",m:"OH! It's Ohio!"},
  {s:"Oklahoma",a:"OK",r:"SW",m:"Oklahoma is OK"},
  {s:"Oregon",a:"OR",r:"W",m:"ORegon trail"},
  {s:"Pennsylvania",a:"PA",r:"NE",m:"PAennsylvania → PA"},
  {s:"Rhode Island",a:"RI",r:"NE",m:"Rhode Island → RI"},
  {s:"South Carolina",a:"SC",r:"SE",m:"South Carolina → SC"},
  {s:"South Dakota",a:"SD",r:"MW",m:"South Dakota → SD"},
  {s:"Tennessee",a:"TN",r:"SE",m:"TeNnessee → TN"},
  {s:"Texas",a:"TX",r:"SW",m:"TeXas → TX"},
  {s:"Utah",a:"UT",r:"W",m:"UTah → UT"},
  {s:"Vermont",a:"VT",r:"NE",m:"VermonT → VT"},
  {s:"Virginia",a:"VA",r:"SE",m:"fVirginiaA → VA"},
  {s:"Washington",a:"WA",r:"W",m:"WAshington state"},
  {s:"West Virginia",a:"WV",r:"SE",m:"West Virginia → WV"},
  {s:"Wisconsin",a:"WI",r:"MW",m:"WIsconsin cheese"},
  {s:"Wyoming",a:"WY",r:"W",m:"WYoming cowboys"},
];

const REGION_NAMES = {NE:"Northeast",SE:"Southeast",MW:"Midwest",SW:"Southwest",W:"West"};

/* ── LEARN MODE ── */
const grid = document.getElementById('cards-grid');
let currentFilter = 'all';
let allFlipped = false;

function renderCards(filter, shuffle) {
  let list = filter === 'all' ? [...STATES] : STATES.filter(s => s.r === filter);
  if (shuffle) list.sort(() => Math.random() - .5);
  grid.innerHTML = '';
  allFlipped = false;
  list.forEach((st, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-face card-front">
        <div class="abbr">${st.a}</div>
        <div class="state-name">${st.s}</div>
        <span class="region-tag region-${st.r}">${st.r}</span>
      </div>
      <div class="card-face card-back">
        <div class="abbr">${st.a}</div>
        <div class="state-name">${st.s}</div>
        <div class="mnemonic">${st.m}</div>
      </div>`;
    card.addEventListener('click', () => card.classList.toggle('flipped'));
    grid.appendChild(card);
    setTimeout(() => card.classList.add('enter'), i * 30);
  });
}

document.querySelectorAll('.learn-controls button[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.learn-controls button[data-filter]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderCards(currentFilter, false);
  });
});

document.getElementById('btn-flip-all').addEventListener('click', () => {
  allFlipped = !allFlipped;
  grid.querySelectorAll('.card').forEach(c => {
    c.classList.toggle('flipped', allFlipped);
  });
});

document.getElementById('btn-shuffle').addEventListener('click', () => {
  renderCards(currentFilter, true);
});

renderCards('all', false);

/* ── QUIZ MODE ── */
let quizQ = [], quizIdx = 0, score = 0, streak = 0, bestStreak = 0;
let missed = [];
let questionStart = 0, quizStart = 0, timerInterval = null;
let dottieShown = false, dottieCooldown = false;

const qBar    = document.getElementById('q-bar');
const qScore  = document.getElementById('q-score');
const qStreak = document.getElementById('q-streak');
const qTimer  = document.getElementById('q-timer');
const qPrompt = document.getElementById('q-prompt');
const qState  = document.getElementById('q-state');
const qOpts   = document.getElementById('q-opts');
const qDone   = document.getElementById('q-complete');
const qFinal  = document.getElementById('q-final');
const qGrade  = document.getElementById('q-grade');
const qMissed = document.getElementById('q-missed');
const streakEl = document.getElementById('streak-flame');
const streakNum = document.getElementById('streak-num');
const dottieEl = document.getElementById('dottie');

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startQuiz() {
  // Build questions: mix of "abbr for state" and "state for abbr"
  quizQ = [];
  const copy = [...STATES];
  shuffleArray(copy);
  copy.forEach((st, i) => {
    const reverse = i % 3 === 0; // ~1/3 reverse questions
    quizQ.push({ ...st, reverse });
  });
  quizIdx = 0; score = 0; streak = 0; bestStreak = 0;
  missed = []; dottieShown = false; dottieCooldown = false;
  quizStart = Date.now();
  qDone.style.display = 'none';
  qOpts.style.display = 'grid';
  qPrompt.style.display = 'block';
  qState.style.display = 'block';
  updateStreak();
  showQuestion();

  clearInterval(timerInterval);
  timerInterval = setInterval(updateTimer, 250);
}

function updateTimer() {
  const elapsed = Math.floor((Date.now() - questionStart) / 1000);
  const m = Math.floor(elapsed / 60);
  const s = String(elapsed % 60).padStart(2, '0');
  qTimer.textContent = `${m}:${s}`;
  qTimer.classList.toggle('warn', elapsed >= 50);

  // DOTTIE check — over 60 seconds on one question
  if (elapsed >= 60 && !dottieShown && !dottieCooldown) {
    dottieShown = true;
    dottieCooldown = true;
    dottieEl.classList.add('show');
    setTimeout(() => {
      dottieEl.classList.remove('show');
      // Allow another Dottie after 60 more seconds
      setTimeout(() => { dottieCooldown = false; dottieShown = false; }, 60000);
    }, 1800);
  }
}

function showQuestion() {
  if (quizIdx >= quizQ.length) return endQuiz();
  const q = quizQ[quizIdx];
  questionStart = Date.now();
  dottieShown = false;
  dottieCooldown = false;

  qBar.style.width = ((quizIdx / quizQ.length) * 100) + '%';
  qScore.textContent = score;

  if (q.reverse) {
    qPrompt.textContent = 'Which state has the abbreviation:';
    qState.textContent = q.a;
    qState.classList.add('reverse');
  } else {
    qPrompt.textContent = 'What is the abbreviation for:';
    qState.textContent = q.s;
    qState.classList.remove('reverse');
  }

  // Generate 4 options
  const correct = q.reverse ? q.s : q.a;
  const pool = STATES.filter(x => x.a !== q.a);
  shuffleArray(pool);
  let options;
  if (q.reverse) {
    options = [correct, ...pool.slice(0, 3).map(x => x.s)];
  } else {
    options = [correct, ...pool.slice(0, 3).map(x => x.a)];
  }
  shuffleArray(options);

  qOpts.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'quiz-opt';
    btn.textContent = opt;
    btn.addEventListener('click', () => handleAnswer(btn, opt, correct, q));
    qOpts.appendChild(btn);
  });
}

function handleAnswer(btn, chosen, correct, q) {
  // Disable all buttons
  qOpts.querySelectorAll('.quiz-opt').forEach(b => b.style.pointerEvents = 'none');

  if (chosen === correct) {
    btn.classList.add('correct');
    score++;
    streak++;
    if (streak > bestStreak) bestStreak = streak;
    updateStreak();
  } else {
    btn.classList.add('wrong');
    streak = 0;
    updateStreak();
    missed.push(q);
    // Highlight correct answer
    qOpts.querySelectorAll('.quiz-opt').forEach(b => {
      if (b.textContent === correct) b.classList.add('correct');
    });
  }

  setTimeout(() => {
    quizIdx++;
    showQuestion();
  }, 800);
}

function updateStreak() {
  qStreak.textContent = streak;
  streakNum.textContent = streak;
  streakEl.classList.toggle('on', streak >= 3);
}

function endQuiz() {
  clearInterval(timerInterval);
  qBar.style.width = '100%';
  qOpts.style.display = 'none';
  qPrompt.style.display = 'none';
  qState.style.display = 'none';
  qTimer.textContent = '';

  qFinal.textContent = score;

  let grade = '';
  if (score === 50) grade = 'PERFECT! You know every state!';
  else if (score >= 45) grade = 'Excellent! Almost perfect!';
  else if (score >= 40) grade = 'Great job!';
  else if (score >= 30) grade = 'Good effort, keep studying!';
  else if (score >= 20) grade = 'Getting there...';
  else grade = 'Time to hit the books!';
  if (bestStreak >= 10) grade += ` (Best streak: ${bestStreak})`;
  qGrade.textContent = grade;

  if (missed.length > 0) {
    qMissed.innerHTML = `<h3>Review these ${missed.length} states:</h3>` +
      missed.map(q => `<div class="missed-item">
        <span class="mi-state">${q.s}</span>
        <span class="mi-abbr">${q.a}</span>
      </div>`).join('');
  } else {
    qMissed.innerHTML = '';
  }

  qDone.style.display = 'block';
}

/* ── TAB SWITCHING ── */
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const mode = tab.dataset.mode;
    document.getElementById('learn-panel').classList.toggle('active', mode === 'learn');
    document.getElementById('quiz-panel').classList.toggle('active', mode === 'quiz');
    if (mode === 'quiz') startQuiz();
  });
});
</script>
</body>
</html>
