<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wordcluster</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #1a1a2e;
  color: #e0e0e0;
  font-family: system-ui, -apple-system, sans-serif;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* Loading screen */
#loading {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: #1a1a2e; z-index: 100;
}
#loading h1 { font-size: 2rem; margin-bottom: 2rem; color: #7c83ff; letter-spacing: 0.1em; }
#loading-bar-outer {
  width: 280px; height: 6px;
  background: #16213e; border-radius: 3px; overflow: hidden;
}
#loading-bar-inner {
  height: 100%; width: 0%;
  background: #7c83ff; border-radius: 3px;
  transition: width 0.3s ease;
}
#loading-status { margin-top: 1rem; font-size: 0.85rem; color: #888; }
#loading.done { opacity: 0; pointer-events: none; transition: opacity 0.5s ease; }

/* App: content column + connector sidebar */
#app {
  flex: 1;
  display: flex;
  flex-direction: row;
  min-height: 0;
}
#content {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

#cloud {
  flex: 1;
  position: relative;
  overflow: hidden;
  min-height: 0;
}

/* Word buttons */
.word-btn {
  position: absolute;
  padding: 0.5em 1em;
  border: 2px solid transparent;
  border-radius: 8px;
  background: #16213e;
  color: #e0e0e0;
  cursor: pointer;
  font-family: system-ui, sans-serif;
  font-size: 1rem;
  white-space: nowrap;
  transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s, opacity 0.35s;
  opacity: 0;
  user-select: none;
}
.word-btn:hover {
  transform: scale(1.1);
  border-color: var(--gc, #7c83ff);
  box-shadow: 0 0 12px color-mix(in srgb, var(--gc, #7c83ff) 40%, transparent);
}
.word-btn.visible { opacity: 1; }
.word-btn.focal {
  font-size: 1.2rem;
  font-weight: 700;
  color: #7c83ff;
  border-color: #7c83ff;
  cursor: default;
  animation: pulse 2s ease-in-out infinite;
}
.word-btn.candidate {
  font-size: 0.8rem;
  padding: 0.4em 0.8em;
  color: var(--gc, #e0e0e0);
}
.word-btn.focal:hover {
  transform: none;
  box-shadow: 0 0 20px rgba(124,131,255,0.5);
}
.word-btn.branch {
  font-size: 0.78rem;
  padding: 0.3em 0.6em;
  background: #131328;
  color: #888;
  border-color: color-mix(in srgb, var(--gc, #7c83ff) 15%, transparent);
}
.word-btn.branch:hover {
  color: #ccc;
  border-color: var(--gc, #5a5fbb);
  box-shadow: 0 0 8px color-mix(in srgb, var(--gc, #7c83ff) 25%, transparent);
}
.word-btn.leaf {
  font-size: 0.82rem;
  padding: 0.2em 0.5em;
  background: #0f0f22;
  color: #666;
  border-color: color-mix(in srgb, var(--gc, #7c83ff) 10%, transparent);
}
.word-btn.leaf:hover {
  color: #aaa;
  border-color: var(--gc, #4a4f99);
  box-shadow: 0 0 6px color-mix(in srgb, var(--gc, #7c83ff) 15%, transparent);
}
.side-label {
  position: absolute;
  font-size: 0.65rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  pointer-events: none;
  z-index: 1;
}
.side-label.left { top: 8px; left: 12px; color: rgba(124,131,255,0.35); }
.side-label.right { top: 8px; right: 12px; color: rgba(255,176,124,0.35); }
#cloud svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 8px rgba(124,131,255,0.3); }
  50% { box-shadow: 0 0 24px rgba(124,131,255,0.6); }
}

/* Connector sidebar — full page height */
#connectors {
  flex: 0 0 auto;
  width: 12rem;
  display: flex;
  flex-flow: row wrap;
  align-content: flex-start;
  gap: 3px;
  padding: 0.4rem;
  overflow-y: auto;
  border-left: 1px solid #2a2a4a;
  background: #131325;
}
#connectors button {
  padding: 0.2em 0.5em;
  border: 1px solid transparent;
  border-radius: 3px;
  background: transparent;
  color: #555;
  cursor: pointer;
  font-family: Georgia, 'Times New Roman', serif;
  font-style: italic;
  font-size: 0.95rem;
  text-align: center;
  white-space: nowrap;
  transition: border-color 0.15s, color 0.15s;
}
#connectors button:hover {
  border-color: #9b7cff;
  color: #c4b5ff;
}

/* Poem area — sits above the cloud */
#poem-area {
  flex: 0 0 auto;
  display: flex; flex-direction: column;
  min-height: 0;
}

#poem-display {
  max-height: 6rem;
  overflow-y: auto;
  padding: 1.5rem 2rem 0.5rem;
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 1.2rem;
  line-height: 1.8;
  color: #ccc;
  white-space: pre-wrap;
  word-wrap: break-word;
}
#poem-display .poem-word {
  display: inline;
  transition: color 0.3s;
}
#poem-display .poem-word:last-child { color: #7c83ff; }

#controls {
  display: flex; gap: 0.5rem;
  padding: 0.75rem 2rem 1rem;
  flex-wrap: wrap;
}
#controls button {
  padding: 0.4em 1em;
  border: 1px solid #3a3a5a;
  border-radius: 6px;
  background: #16213e;
  color: #bbb;
  cursor: pointer;
  font-size: 0.85rem;
  transition: border-color 0.15s, color 0.15s;
}
#controls button:hover { border-color: #7c83ff; color: #fff; }
#controls button:disabled { opacity: 0.3; cursor: default; }

#hint {
  font-size: 0.75rem;
  color: #555;
  padding: 0 2rem 0.75rem;
}
#version {
  font-size: 0.65rem;
  color: #333;
  padding: 0 2rem 0.5rem;
  text-align: right;
}

/* Responsive */
@media (max-width: 600px) {
  .word-btn { font-size: 0.85rem; padding: 0.4em 0.8em; }
  .word-btn.focal { font-size: 1rem; }
  .word-btn.candidate { font-size: 0.7rem; padding: 0.3em 0.7em; }
  .word-btn.branch { font-size: 0.65rem; padding: 0.2em 0.5em; }
  .word-btn.leaf { font-size: 0.7rem; padding: 0.15em 0.4em; }
  #poem-display { font-size: 1rem; padding: 1rem 1rem 0.5rem; }
  #connectors { width: 8rem; padding: 0.2rem; }
  #connectors button { font-size: 0.8rem; }
  #controls { padding: 0.5rem 1rem 0.75rem; }
  #hint { padding: 0 1rem 0.5rem; }
}
</style>
</head>
<body>

<div id="loading">
  <h1>wordcluster</h1>
  <div id="loading-bar-outer"><div id="loading-bar-inner"></div></div>
  <div id="loading-status">loading data...</div>
</div>

<div id="app">
  <div id="content">
    <div id="poem-area">
      <div id="poem-display"></div>
      <div id="controls">
        <button id="btn-undo" disabled>undo</button>
        <button id="btn-clear" disabled>clear</button>
        <button id="btn-newword">new word</button>
        <button id="btn-copy">copy poem</button>
      </div>
    </div>
    <div id="cloud">
      <div class="side-label left">related</div>
      <div class="side-label right">next</div>
    </div>
    <div id="hint">click words to build a poem &middot; Enter = line break &middot; Ctrl+Z = undo</div>
    <div id="version">v0.9.0 &middot; 2026-03-04</div>
  </div>
  <div id="connectors"></div>
</div>

<script>
(function() {
  'use strict';

  // Connector / helper words (sorted alphabetically)
  const TOOLBAR_WORDS = [
    'a','all','always','an','and','are','as','at','be','been','but','by',
    'could','each','every','for','from','had','has','he','her','here',
    'his','I','in','into','is','it','its','like','may','me','might',
    'my','never','no','nor','not','now','of','on','or','our',
    'shall','she','so','some','than','that','the','their','them',
    'then','there','they','this','those','through','to','was','we',
    'were','where','when','who','will','with','would','yet','you','your'
  ];

  const DIVERSITY_PENALTY = 0.3;
  const CONTEXT_WINDOW = 4;
  const SIDE_COUNT = 5;        // candidates per side
  const SIDE_POOL = 12;        // top-N to sample from per side
  const BRANCH_COUNT = 2;
  const EMBED_DIMS = 30;
  const STAGGER_MS = 50;
  const FADE_MS = 350;
  const COLOR_RELATED = '#7c83ff';
  const COLOR_NEXT = '#ffb07c';

  // State
  let vocab = [];
  let graph = {};
  let embeddings = null; // Float32Array
  let wordToIndex = {};
  let poem = [];          // [{word, isBreak}]
  let focalWord = null;
  let wordButtons = [];
  let cloudEl, poemEl;
  let simRAF = null;      // physics simulation frame ID

  // Data loading
  async function loadData() {
    const bar = document.getElementById('loading-bar-inner');
    const status = document.getElementById('loading-status');
    const base = getBasePath();

    let loaded = 0;
    const total = 3;
    function tick(msg) {
      loaded++;
      bar.style.width = (loaded / total * 100) + '%';
      status.textContent = msg;
    }

    const [vocabRes, graphRes, embRes] = await Promise.all([
      fetch(base + 'data/vocab.json').then(r => { tick('vocabulary loaded'); return r.json(); }),
      fetch(base + 'data/graph.json').then(r => { tick('graph loaded'); return r.json(); }),
      fetch(base + 'data/embeddings.bin').then(r => { tick('embeddings loaded'); return r.arrayBuffer(); }),
    ]);

    vocab = vocabRes;
    graph = graphRes;
    embeddings = new Float32Array(embRes);

    for (let i = 0; i < vocab.length; i++) {
      wordToIndex[vocab[i]] = i;
    }

    document.getElementById('loading').classList.add('done');
  }

  function getBasePath() {
    const path = window.location.pathname;
    if (path.endsWith('/') || path.endsWith('/index.html')) {
      return path.endsWith('/') ? path : path.replace('index.html', '');
    }
    return path.substring(0, path.lastIndexOf('/') + 1);
  }

  // Embedding helpers
  function getEmbedding(word) {
    const idx = wordToIndex[word];
    if (idx === undefined) return null;
    const start = idx * EMBED_DIMS;
    return embeddings.subarray(start, start + EMBED_DIMS);
  }

  function cosineSim(a, b) {
    let dot = 0, na = 0, nb = 0;
    for (let i = 0; i < EMBED_DIMS; i++) {
      dot += a[i] * b[i];
      na += a[i] * a[i];
      nb += b[i] * b[i];
    }
    return dot / (Math.sqrt(na) * Math.sqrt(nb) + 1e-8);
  }

  function poemContextVector() {
    const words = poem.filter(p => !p.isBreak).map(p => p.word);
    if (words.length === 0) return null;
    const recent = words.slice(-CONTEXT_WINDOW);
    const ctx = new Float32Array(EMBED_DIMS);
    let totalWeight = 0;
    // Recency-weighted: most recent word contributes most
    for (let k = 0; k < recent.length; k++) {
      const emb = getEmbedding(recent[k]);
      if (emb) {
        const weight = k + 1; // 1, 2, 3, 4 — most recent heaviest
        for (let i = 0; i < EMBED_DIMS; i++) ctx[i] += emb[i] * weight;
        totalWeight += weight;
      }
    }
    if (totalWeight === 0) return null;
    let norm = 0;
    for (let i = 0; i < EMBED_DIMS; i++) norm += ctx[i] * ctx[i];
    norm = Math.sqrt(norm) + 1e-8;
    for (let i = 0; i < EMBED_DIMS; i++) ctx[i] /= norm;
    return ctx;
  }

  // Direction the poem is moving — last word minus previous word
  function poemTrajectoryVector() {
    const words = poem.filter(p => !p.isBreak).map(p => p.word);
    if (words.length < 2) return null;
    const last = getEmbedding(words[words.length - 1]);
    const prev = getEmbedding(words[words.length - 2]);
    if (!last || !prev) return null;
    const traj = new Float32Array(EMBED_DIMS);
    for (let i = 0; i < EMBED_DIMS; i++) traj[i] = last[i] - prev[i];
    let norm = 0;
    for (let i = 0; i < EMBED_DIMS; i++) norm += traj[i] * traj[i];
    norm = Math.sqrt(norm) + 1e-8;
    for (let i = 0; i < EMBED_DIMS; i++) traj[i] /= norm;
    return traj;
  }

  // Weighted random sample helper
  function weightedSample(pool, count) {
    const selected = [];
    const used = new Set();
    while (selected.length < count && selected.length < pool.length) {
      const total = pool.reduce((s, p) => s + (used.has(p.word) ? 0 : p.score), 0);
      if (total <= 0) break;
      let r = Math.random() * total;
      for (const p of pool) {
        if (used.has(p.word)) continue;
        r -= p.score;
        if (r <= 0) { selected.push(p.word); used.add(p.word); break; }
      }
    }
    return selected;
  }

  // Split selection: "related" (pure association) vs "next" (poem-context-aware)
  function selectSplitCandidates(focal) {
    const neighbors = graph[focal];
    if (!neighbors || neighbors.length === 0) {
      const shuffled = [...vocab].sort(() => Math.random() - 0.5);
      const related = shuffled.slice(0, SIDE_COUNT);
      const next = shuffled.slice(SIDE_COUNT, SIDE_COUNT * 2);
      const excl = new Set([focal, ...related, ...next]);
      return {
        related, next,
        relatedTree: buildBranchTree(related, new Set(excl)),
        nextTree: buildNextTree(next, new Set(excl))
      };
    }

    const ctx = poemContextVector();
    const traj = poemTrajectoryVector();
    const poemWords = new Set(poem.filter(p => !p.isBreak).map(p => p.word));

    // Score every neighbor two ways
    const allScored = neighbors.map((w, rank) => {
      const rankScore = 1 - rank / neighbors.length;
      const penalty = poemWords.has(w) ? DIVERSITY_PENALTY : 0;

      // Related: pure graph association
      const relScore = Math.max(rankScore - penalty, 0.01);

      // Next: poem-context-weighted
      let nextScore;
      if (ctx) {
        const emb = getEmbedding(w);
        let ctxSim = 0, trajSim = 0;
        if (emb) ctxSim = (cosineSim(ctx, emb) + 1) / 2;
        if (traj && emb) trajSim = (cosineSim(traj, emb) + 1) / 2;
        nextScore = Math.max(0.2 * rankScore + 0.55 * ctxSim + 0.25 * trajSim - penalty, 0.01);
      } else {
        nextScore = Math.max(rankScore - penalty, 0.01);
      }

      return { word: w, relScore, nextScore };
    });

    // Pick 5 "related" — best by association rank
    const relPool = [...allScored]
      .sort((a, b) => b.relScore - a.relScore)
      .slice(0, SIDE_POOL)
      .map(s => ({ word: s.word, score: s.relScore }));
    const related = weightedSample(relPool, SIDE_COUNT);
    const usedWords = new Set(related);

    // Pick 5 "next" — best by context score, excluding already-picked
    const nextPool = allScored
      .filter(s => !usedWords.has(s.word))
      .sort((a, b) => b.nextScore - a.nextScore)
      .slice(0, SIDE_POOL)
      .map(s => ({ word: s.word, score: s.nextScore }));
    const next = weightedSample(nextPool, SIDE_COUNT);

    const excl = new Set([focal, ...related, ...next]);
    return {
      related, next,
      relatedTree: buildBranchTree(related, new Set(excl)),
      nextTree: buildNextTree(next, new Set(excl))
    };
  }

  // Context-aware neighbor picker for "next" side
  function pickNextFromGraph(word, used, count, contextWords) {
    const neighbors = graph[word] || [];
    const ctx = new Float32Array(EMBED_DIMS);
    let total = 0;
    for (let k = 0; k < contextWords.length; k++) {
      const emb = getEmbedding(contextWords[k]);
      if (emb) {
        const w = k + 1;
        for (let i = 0; i < EMBED_DIMS; i++) ctx[i] += emb[i] * w;
        total += w;
      }
    }
    if (total > 0) {
      let norm = 0;
      for (let i = 0; i < EMBED_DIMS; i++) norm += ctx[i] * ctx[i];
      norm = Math.sqrt(norm) + 1e-8;
      for (let i = 0; i < EMBED_DIMS; i++) ctx[i] /= norm;
    }

    const scored = [];
    for (const n of neighbors) {
      if (used.has(n)) continue;
      const emb = getEmbedding(n);
      let score = 0.5;
      if (emb && total > 0) score = (cosineSim(ctx, emb) + 1) / 2;
      scored.push({ word: n, score });
    }
    scored.sort((a, b) => b.score - a.score);

    const picks = [];
    for (const s of scored) {
      if (picks.length >= count) break;
      picks.push(s.word);
      used.add(s.word);
    }
    return picks;
  }

  // Pick N neighbors from graph not in `used`, adding picks to `used`
  function pickFromGraph(word, used, count) {
    const neighbors = graph[word] || [];
    const picks = [];
    for (const n of neighbors) {
      if (picks.length >= count) break;
      if (!used.has(n)) {
        picks.push(n);
        used.add(n);
      }
    }
    return picks;
  }

  // Build 2-level branch tree: candidate → branches → leaves
  function buildBranchTree(candidates, used) {
    const tree = {};
    for (const word of candidates) {
      const branches = pickFromGraph(word, used, BRANCH_COUNT);
      const leaves = {};
      for (const bw of branches) {
        leaves[bw] = pickFromGraph(bw, used, BRANCH_COUNT);
      }
      tree[word] = { branches, leaves };
    }
    return tree;
  }

  // Context-aware branch tree for "next" side
  function buildNextTree(candidates, used) {
    const poemWords = poem.filter(p => !p.isBreak).map(p => p.word).slice(-CONTEXT_WINDOW);
    const tree = {};
    for (const word of candidates) {
      const ctx1 = [...poemWords, word];
      const branches = pickNextFromGraph(word, used, BRANCH_COUNT, ctx1);
      const leaves = {};
      for (const bw of branches) {
        const ctx2 = [...ctx1, bw];
        leaves[bw] = pickNextFromGraph(bw, used, BRANCH_COUNT, ctx2);
      }
      tree[word] = { branches, leaves };
    }
    return tree;
  }

  // UI: radial word cloud with real-time physics anti-overlap
  function layoutCloud(data) {
    if (simRAF) { cancelAnimationFrame(simRAF); simRAF = null; }

    const oldButtons = [...wordButtons];
    oldButtons.forEach(btn => btn.classList.remove('visible'));
    setTimeout(() => {
      oldButtons.forEach(btn => { if (btn.parentNode) btn.parentNode.removeChild(btn); });
    }, FADE_MS);
    wordButtons = [];

    let svg = cloudEl.querySelector('svg');
    if (!svg) {
      svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      cloudEl.appendChild(svg);
    }
    svg.innerHTML = '';

    setTimeout(() => {
      const rect = cloudEl.getBoundingClientRect();
      const W = rect.width;
      const H = rect.height;
      const cx = W / 2;
      const cy = H / 2;

      cloudEl.querySelectorAll('.side-label').forEach(el => el.style.opacity = '');

      // Ring radii scaled to cloud size
      const r1x = Math.min(cx * 0.32, 150);
      const r1y = Math.min(cy * 0.30, 105);
      const r2x = Math.min(cx * 0.60, 280);
      const r2y = Math.min(cy * 0.56, 185);
      const r3x = Math.min(cx * 0.88, 410);
      const r3y = Math.min(cy * 0.84, 270);
      const branchSpread = 0.14;
      const leafSpread = 0.08;

      const nodes = [];   // { btn, x, y, tx, ty, vx, vy, w, h, fixed }
      const edgeDefs = []; // { from, to, depth, color }

      function addNode(word, type, sideClass, sideColor, ix, iy, fixed) {
        const btn = makeButton(word, type);
        if (sideClass) btn.classList.add(sideClass);
        if (sideColor) btn.style.setProperty('--gc', sideColor);
        cloudEl.appendChild(btn);
        wordButtons.push(btn);
        const r = btn.getBoundingClientRect();
        // clamp initial position inside bounds
        const px = Math.max(r.width / 2 + 2, Math.min(W - r.width / 2 - 2, ix));
        const py = Math.max(r.height / 2 + 2, Math.min(H - r.height / 2 - 2, iy));
        btn.style.left = (px - r.width / 2) + 'px';
        btn.style.top = (py - r.height / 2) + 'px';
        const idx = nodes.length;
        nodes.push({
          btn, x: px, y: py, tx: px, ty: py,
          vx: 0, vy: 0, w: r.width, h: r.height, fixed: !!fixed
        });
        return idx;
      }

      // Focal word — fixed at center
      const focalIdx = addNode(data.focal, 'focal', null, null, cx, cy, true);
      requestAnimationFrame(() => nodes[focalIdx].btn.classList.add('visible'));

      // Lay out one side on a semicircular arc
      function layoutSide(words, tree, arcCenter, arcSpan, sideColor, sideClass, stBase) {
        const count = words.length;
        const arcStart = arcCenter - arcSpan / 2;
        const step = count > 1 ? arcSpan / (count - 1) : 0;

        words.forEach((word, i) => {
          const angle = arcStart + step * i;
          const jitter = 0.92 + Math.random() * 0.16;
          const ix = cx + Math.cos(angle) * r1x * jitter;
          const iy = cy + Math.sin(angle) * r1y * jitter;

          const candIdx = addNode(word, 'candidate', sideClass, sideColor, ix, iy);
          edgeDefs.push({ from: focalIdx, to: candIdx, depth: 0, color: sideColor });
          setTimeout(() => nodes[candIdx].btn.classList.add('visible'), stBase + STAGGER_MS * i);

          const info = tree && tree[word];
          if (!info) return;

          info.branches.forEach((bw, bi) => {
            const bAngle = angle + (bi - (info.branches.length - 1) / 2) * branchSpread;
            const bx = cx + Math.cos(bAngle) * r2x * jitter;
            const by = cy + Math.sin(bAngle) * r2y * jitter;

            const brIdx = addNode(bw, 'branch', sideClass, sideColor, bx, by);
            edgeDefs.push({ from: candIdx, to: brIdx, depth: 1, color: sideColor });
            setTimeout(() => nodes[brIdx].btn.classList.add('visible'), stBase + STAGGER_MS * i + 120 + bi * 60);

            const lvs = info.leaves[bw] || [];
            lvs.forEach((lw, li) => {
              const lAngle = bAngle + (li - (lvs.length - 1) / 2) * leafSpread;
              const lx = cx + Math.cos(lAngle) * r3x * jitter;
              const ly = cy + Math.sin(lAngle) * r3y * jitter;

              const lfIdx = addNode(lw, 'leaf', sideClass, sideColor, lx, ly);
              edgeDefs.push({ from: brIdx, to: lfIdx, depth: 2, color: sideColor });
              setTimeout(() => nodes[lfIdx].btn.classList.add('visible'), stBase + STAGGER_MS * i + 220 + bi * 60 + li * 40);
            });
          });
        });
      }

      // Left semicircle = related, right semicircle = next
      layoutSide(data.related, data.relatedTree, Math.PI, Math.PI * 0.78, COLOR_RELATED, 'side-l', 0);
      layoutSide(data.next, data.nextTree, 0, Math.PI * 0.78, COLOR_NEXT, 'side-r', 30);

      // Create SVG line elements once, update positions each frame
      const lineOpacity = [0.25, 0.15, 0.10];
      const lineWidths = [1.5, 1, 0.7];
      const svgLines = edgeDefs.map(e => {
        const f = nodes[e.from], t = nodes[e.to];
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', f.x); line.setAttribute('y1', f.y);
        line.setAttribute('x2', t.x); line.setAttribute('y2', t.y);
        line.setAttribute('stroke', e.color);
        line.setAttribute('stroke-width', lineWidths[e.depth]);
        line.setAttribute('opacity', lineOpacity[e.depth]);
        svg.appendChild(line);
        return { el: line, from: e.from, to: e.to };
      });

      // --- Physics simulation ---
      const SPRING = 0.03;   // pull toward ideal radial position
      const REPEL = 0.12;    // push strength on overlap
      const DAMP = 0.82;     // velocity damping per frame
      const MARGIN = 4;      // extra gap between buttons

      function tick() {
        // Spring toward target position
        for (const n of nodes) {
          if (n.fixed) continue;
          n.vx += (n.tx - n.x) * SPRING;
          n.vy += (n.ty - n.y) * SPRING;
        }

        // AABB repulsion between all pairs
        for (let i = 0; i < nodes.length; i++) {
          for (let j = i + 1; j < nodes.length; j++) {
            const a = nodes[i], b = nodes[j];
            const dx = b.x - a.x;
            const dy = b.y - a.y;
            const minDx = (a.w + b.w) / 2 + MARGIN;
            const minDy = (a.h + b.h) / 2 + MARGIN;
            const ox = minDx - Math.abs(dx);
            const oy = minDy - Math.abs(dy);
            if (ox > 0 && oy > 0) {
              // push along axis of least overlap
              if (ox < oy) {
                const push = ox * REPEL * (dx >= 0 ? -1 : 1);
                if (!a.fixed) a.vx += push;
                if (!b.fixed) b.vx -= push;
              } else {
                const push = oy * REPEL * (dy >= 0 ? -1 : 1);
                if (!a.fixed) a.vy += push;
                if (!b.fixed) b.vy -= push;
              }
            }
          }
        }

        // Integrate velocity → position, clamp to bounds, update DOM
        for (const n of nodes) {
          if (n.fixed) continue;
          n.vx *= DAMP;
          n.vy *= DAMP;
          n.x += n.vx;
          n.y += n.vy;
          n.x = Math.max(n.w / 2 + 2, Math.min(W - n.w / 2 - 2, n.x));
          n.y = Math.max(n.h / 2 + 2, Math.min(H - n.h / 2 - 2, n.y));
          n.btn.style.left = (n.x - n.w / 2) + 'px';
          n.btn.style.top = (n.y - n.h / 2) + 'px';
        }

        // Update SVG lines to follow nodes
        for (const sl of svgLines) {
          const f = nodes[sl.from], t = nodes[sl.to];
          sl.el.setAttribute('x1', f.x); sl.el.setAttribute('y1', f.y);
          sl.el.setAttribute('x2', t.x); sl.el.setAttribute('y2', t.y);
        }

        simRAF = requestAnimationFrame(tick);
      }

      simRAF = requestAnimationFrame(tick);
    }, 100);
  }

  function makeButton(word, type) {
    const btn = document.createElement('button');
    btn.className = 'word-btn ' + type;
    btn.textContent = word;
    if (type !== 'focal') {
      btn.addEventListener('click', () => onWordClick(word));
    }
    return btn;
  }

  function onWordClick(word) {
    poem.push({ word, isBreak: false });
    focalWord = word;
    updatePoem();
    updateCloud();
    updateControls();
  }

  // Connectors add to poem but don't change focal word or cloud
  function onConnectorClick(word) {
    poem.push({ word, isBreak: false });
    updatePoem();
    updateControls();
  }

  function updateCloud() {
    if (!focalWord) {
      layoutStarterCloud();
    } else {
      const split = selectSplitCandidates(focalWord);
      layoutCloud({ focal: focalWord, ...split });
    }
  }

  // Starter mode: scattered random words, no focal, no lines
  function layoutStarterCloud() {
    if (simRAF) { cancelAnimationFrame(simRAF); simRAF = null; }
    const oldButtons = [...wordButtons];
    oldButtons.forEach(btn => btn.classList.remove('visible'));
    setTimeout(() => {
      oldButtons.forEach(btn => { if (btn.parentNode) btn.parentNode.removeChild(btn); });
    }, FADE_MS);
    wordButtons = [];

    // Hide side labels, clear SVG
    cloudEl.querySelectorAll('.side-label').forEach(el => el.style.opacity = '0');
    let svg = cloudEl.querySelector('svg');
    if (svg) svg.innerHTML = '';

    setTimeout(() => {
      const rect = cloudEl.getBoundingClientRect();
      const count = 15;
      const picks = [];
      const used = new Set();
      while (picks.length < count) {
        const w = vocab[Math.floor(Math.random() * vocab.length)];
        if (!used.has(w)) { picks.push(w); used.add(w); }
      }

      picks.forEach((word, i) => {
        const btn = document.createElement('button');
        btn.className = 'word-btn';
        btn.textContent = word;
        btn.addEventListener('click', () => {
          focalWord = word;
          poem.push({ word, isBreak: false });
          updatePoem();
          updateCloud();
          updateControls();
        });
        cloudEl.appendChild(btn);
        wordButtons.push(btn);

        // Scatter randomly across the cloud area
        const br = btn.getBoundingClientRect();
        const px = 20 + Math.random() * (rect.width - br.width - 40);
        const py = 20 + Math.random() * (rect.height - br.height - 40);
        btn.style.left = px + 'px';
        btn.style.top = py + 'px';
        setTimeout(() => btn.classList.add('visible'), 30 + i * 40);
      });
    }, 100);
  }

  // UI: poem display
  function updatePoem() {
    poemEl.innerHTML = '';
    for (let i = 0; i < poem.length; i++) {
      const p = poem[i];
      if (p.isBreak) {
        poemEl.appendChild(document.createTextNode('\n'));
      } else {
        const span = document.createElement('span');
        span.className = 'poem-word';
        span.textContent = (i > 0 && !poem[i - 1].isBreak ? ' ' : '') + p.word;
        poemEl.appendChild(span);
      }
    }
    // Scroll to bottom
    poemEl.scrollTop = poemEl.scrollHeight;
  }

  function updateControls() {
    const hasWords = poem.some(p => !p.isBreak);
    document.getElementById('btn-undo').disabled = poem.length === 0;
    document.getElementById('btn-clear').disabled = !hasWords;
  }

  // Actions
  function undo() {
    if (poem.length === 0) return;
    poem.pop();
    // Find last word for focal
    const lastWord = [...poem].reverse().find(p => !p.isBreak);
    if (lastWord) {
      focalWord = lastWord.word;
    } else {
      focalWord = null;
    }
    updatePoem();
    updateCloud();
    updateControls();
  }

  function clearPoem() {
    poem = [];
    focalWord = null;
    updatePoem();
    updateCloud();
    updateControls();
  }

  function newWord() {
    if (!focalWord) {
      // In starter mode, just reshuffle
      updateCloud();
    } else {
      focalWord = pickRandomWord();
      updateCloud();
    }
  }

  function copyPoem() {
    const text = poem.map(p => p.isBreak ? '\n' : p.word).join(' ')
      .replace(/ \n /g, '\n').replace(/ \n/g, '\n').replace(/\n /g, '\n').trim();
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text);
    } else {
      // Fallback
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
    const btn = document.getElementById('btn-copy');
    btn.textContent = 'copied!';
    setTimeout(() => btn.textContent = 'copy poem', 1500);
  }

  function pickRandomWord() {
    return vocab[Math.floor(Math.random() * vocab.length)];
  }

  // Keyboard
  function onKeyDown(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      if (poem.length > 0 && !poem[poem.length - 1].isBreak) {
        poem.push({ isBreak: true });
        updatePoem();
      }
    }
    if (e.key === 'z' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      undo();
    }
  }

  // Resize
  function onResize() {
    updateCloud();
  }

  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(onResize, 200);
  });

  // Init
  async function init() {
    cloudEl = document.getElementById('cloud');
    poemEl = document.getElementById('poem-display');

    document.getElementById('btn-undo').addEventListener('click', undo);
    document.getElementById('btn-clear').addEventListener('click', clearPoem);
    document.getElementById('btn-newword').addEventListener('click', newWord);
    document.getElementById('btn-copy').addEventListener('click', copyPoem);
    document.addEventListener('keydown', onKeyDown);

    // Build connector toolbar
    const connBar = document.getElementById('connectors');
    TOOLBAR_WORDS.forEach(w => {
      const btn = document.createElement('button');
      btn.textContent = w;
      btn.addEventListener('click', () => onConnectorClick(w));
      connBar.appendChild(btn);
    });

    try {
      await loadData();
    } catch (err) {
      document.getElementById('loading-status').textContent = 'Error loading data: ' + err.message;
      console.error(err);
      return;
    }

    focalWord = null;
    updateCloud();
  }

  init();
})();
</script>
</body>
</html>
